### MangoHud Configuration ###

# --- Visual Settings ---
# Background transparency (0.0 to 1.0)
background_alpha=0.4
# Round the corners of the HUD
round_corners=10
# Font size (Default is 24)
font_size=24
# Position: top-left, top-right, bottom-left, bottom-right
position=top-left

# --- GPU Stats ---
gpu_stats
gpu_temp
gpu_core_clock
# gpu_mem_temp
# gpu_power

# --- CPU Stats ---
cpu_stats
cpu_temp
# cpu_mhz

# --- RAM & VRAM ---
# ram
vram

# --- FPS & Frame Timing ---
fps
# frame_timing
frametime

# --- System Info ---
vulkan_driver
wine
# engine_version

# --- Keybinds ---
# Toggle HUD: Right Shift + F12
toggle_hud=Shift_L+F12
# Toggle FPS Limit: Left Shift + F1
toggle_fps_limit=Shift_L+F1

# --- Settings ---
vsync = 0
fps_limit = 60,0
